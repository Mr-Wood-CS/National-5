        - Tasks: '03-ddd/04-implementation/3.4.1.1-select-tasks.md'
      - SQL Insert/Update/Delete:
        - Explanation: '03-ddd/04-implementation/3.4.2-sql-insert.md'
        - Tasks: '03-ddd/04-implementation/3.4.2.1-insert-update-delete-tasks.md'
      - SQL Equi-Joins: '03-ddd/04-implementation/3.4.3-sql-equi-joins.md'
      - SQL Practice Tasks:
        - Select/From/Where: '03-ddd/04-implementation/3.4.4.1-select-from-where-tasks.md'
    - Testing: '03-ddd/05-testing/3.5-DB-Testing.md'
    - Evaluation: '03-ddd/06-evaluation/3.6-DB-Evaluation.md'

      
markdown_extensions:
      - admonition
      - pymdownx.details
      - def_list
      - pymdownx.critic
      - pymdownx.caret
      - pymdownx.keys
      - pymdownx.mark
      - pymdownx.tilde
      - attr_list
      - md_in_html    
      - pymdownx.emoji:
          emoji_index: !!python/name:material.extensions.emoji.twemoji
          emoji_generator: !!python/name:material.extensions.emoji.to_svg
      - pymdownx.superfences
      - pymdownx.tabbed:
          alternate_style: true
      - pymdownx.highlight:
          use_pygments: true
          anchor_linenums: true
          line_spans: __span
          pygments_lang_class: true
      - pymdownx.inlinehilite
      - pymdownx.snippets
      
theme:
  name: material
  font:
    text: Quicksand
  palette:
    scheme: default
    primary: blue
    accent: deep orange
  icon:
    admonition:
      note: fontawesome/solid/note-sticky
      abstract: fontawesome/solid/book
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/bullhorn
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/bomb
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/robot
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes 
    - navigation.path
    #- navigation.footer
    - navigation.tabs
#plugins:
  #- glightbox

copyright: Copyright &copy; 2025 Pixel&Wood Computer Science Tuition

extra_css:
  - Styles/extra.css

extra_javascript:
  - scripts/extra.js
    
